site_name: PYTHON 2026
site_description: Лабораторных работе по Python
site_author: Алексей Слободской

theme:
  name: material
  language: ru
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - navigation.top
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Главная: index.md
  - Об авторе: about.md
  - Лабораторные работы:
    - Обзор: labs/index.md
    - Лабораторная работа 1: labs/lab1.md
    - Лабораторная работа 2: labs/lab2.md
    - Лабораторная работа 3: labs/lab3.md
    - Лабораторная работа 4: labs/lab4.md
    - Лабораторная работа 5: labs/lab5.md

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - admonition